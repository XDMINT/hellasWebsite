[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  external_node_modules = []

# Immutable statische Assets (_astro/ enthält gehashte Dateinamen)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Schriften
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Bilder im public-Ordner
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# favicon & manifest
[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# WordPress-Shortcuts
[[redirects]]
  from = "/login"
  to   = "https://cms.wsv-hellas.de/wp-login.php"
  status = 301
  force  = true

[[redirects]]
  from = "/wp-admin"
  to   = "https://cms.wsv-hellas.de/wp-admin/"
  status = 301
  force  = true




